name: Production monitor

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Wait for deployment and check endpoints
        shell: bash
        run: |
          set -euo pipefail
          base="https://pc-und-handyservice-augsburg.pages.dev"
          endpoints=("/" "/impressum.html" "/datenschutz.html" "/robots.txt" "/sitemap.xml" "/site.webmanifest" "/og-image.png" "/icon-192.png")
          for attempt in {1..18}; do
            all_ready=true
            for endpoint in "${endpoints[@]}"; do
              code="$(curl --silent --show-error --location --retry 2 --output /dev/null --write-out '%{http_code}' "${base}${endpoint}" || true)"
              if [[ "$code" != "200" ]]; then
                all_ready=false
                break
              fi
            done
            page="$(curl --silent --show-error --location --retry 2 "${base}/" || true)"
            if [[ "$all_ready" == "true" ]] && grep --fixed-strings --quiet 'script.min.js?v=' <<< "$page"; then
              echo "Deployment is ready after attempt ${attempt}."
              exit 0
            fi
            echo "Deployment not ready yet (attempt ${attempt}/18)."
            sleep 10
          done
          echo "Production deployment did not become ready in time."
          exit 1

      - name: Check security and cache headers
        shell: bash
        run: |
          set -euo pipefail
          base="https://pc-und-handyservice-augsburg.pages.dev"
          headers="$(curl --silent --show-error --head --location --retry 3 "${base}/")"
          for header in strict-transport-security content-security-policy x-content-type-options referrer-policy permissions-policy; do
            if ! grep --ignore-case --quiet "^${header}:" <<< "$headers"; then
              echo "Missing security header: ${header}"
              exit 1
            fi
          done
          asset_headers="$(curl --silent --show-error --head --location --retry 3 "${base}/styles.min.css?v=20260715")"
          if ! grep --ignore-case --quiet '^cache-control:.*max-age=0' <<< "$asset_headers"; then
            echo "Mutable assets are not configured for immediate revalidation"
            exit 1
          fi
          image_headers="$(curl --silent --show-error --head --location --retry 3 "${base}/og-image.png")"
          if ! grep --ignore-case --quiet '^cache-control:.*immutable' <<< "$image_headers"; then
            echo "Version-stable images are not cached immutably"
            exit 1
          fi

      - name: Check production content
        shell: bash
        run: |
          set -euo pipefail
          page="$(curl --silent --show-error --location --retry 3 "https://pc-und-handyservice-augsburg.pages.dev/")"
          for marker in 'PC & Handyservice Augsburg' 'site.webmanifest?v=' 'script.min.js?v=' 'og:image' 'application/ld+json'; do
            if ! grep --fixed-strings --quiet "$marker" <<< "$page"; then
              echo "Missing production marker: ${marker}"
              exit 1
            fi
          done
