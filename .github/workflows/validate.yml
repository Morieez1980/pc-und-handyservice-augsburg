name: Website validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check JavaScript syntax
        run: node --check script.js && node --check script.min.js && node --check clarity-consent.js && node --check clarity-consent.min.js
      - name: Validate static website and security requirements
        run: node tools/validate.mjs
