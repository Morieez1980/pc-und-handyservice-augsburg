<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Google-QR-Grafik Reparaturanfrage</title>
  <style>*{box-sizing:border-box}html,body{width:1200px;height:1200px;margin:0;overflow:hidden}body{display:grid;place-items:center;background:radial-gradient(circle at 82% 12%,#ff6b6150,transparent 28%),linear-gradient(145deg,#07101e,#121a2d);color:#fff;font-family:Arial,sans-serif}.card{width:1040px;height:1040px;padding:70px;display:grid;grid-template-columns:1fr 430px;gap:55px;align-items:center;border:2px solid #ff6b6170;border-radius:48px;background:#080d19e8;box-shadow:0 32px 100px #0008}.tag{display:inline-block;padding:12px 18px;border-radius:999px;background:#ff6b61;color:#111522;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.copy h1{margin:28px 0 22px;font-size:72px;line-height:1.02;letter-spacing:-.055em}.copy h1 em{font-style:normal;color:#ff6b61}.copy p{color:#b9c2cf;font-size:27px;line-height:1.45}.brand{margin-top:50px;font-weight:900;font-size:25px}.brand small{display:block;margin-top:7px;color:#8793a7;font-size:18px}.qrbox{padding:28px;border-radius:34px;background:#fff;color:#111;text-align:center}.qrbox img{display:block;width:374px;height:374px}.qrbox strong{display:block;margin-top:18px;font-size:25px}.qrbox span{display:block;margin-top:7px;color:#555f70;font-size:18px}</style>
</head>
<body><main class="card"><section class="copy"><span class="tag">Direkte Anfrage</span><h1>Reparatur online <em>anfragen</em></h1><p>QR-Code scannen, Gerät und Fehler beschreiben – wir melden uns schnellstmöglich.</p><div class="brand">PC &amp; Handyservice Augsburg<small>Maurice Keil · Termine nach Vereinbarung</small></div></section><section class="qrbox"><img src="/qr-reparaturanfrage.png" width="1000" height="1000" alt="QR-Code"><strong>Jetzt scannen</strong><span>Keine Zugangsdaten eintragen</span></section></main></body>
</html>
